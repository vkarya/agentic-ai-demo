apiVersion: apps/v1
kind: Deployment
metadata:
  name: feedback-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: feedback-backend
  template:
    metadata:
      labels:
        app: feedback-backend
    spec:
      containers:
        - name: backend
          image: your-dockerhub-username/feedback-backend:latest
          ports:
            - containerPort: 8000
          env:
            # Adjust API_BASE to however your cluster can reach Ollama.
            - name: API_BASE
              value: "http://host.docker.internal:11434/v1"
            - name: MODEL_NAME
              value: "llama3.2"
            - name: API_KEY
              value: "ollama"
            - name: CORS_ORIGINS
              value: "http://localhost:4200"
---
apiVersion: v1
kind: Service
metadata:
  name: feedback-backend
spec:
  type: ClusterIP
  selector:
    app: feedback-backend
  ports:
    - port: 8000
      targetPort: 8000

